# ---------------------------------------------------------------------------
# Auto-label PRs based on changed file paths
# Uses the config in .github/labeler.yml
# ---------------------------------------------------------------------------
name: PR Labeler

# pull_request_target: GITHUB_TOKEN can label/comment on PRs from forks (read-only token on pull_request).
# This job does not checkout untrusted PR code; labeler resolves paths via the GitHub API.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply path-based labels
    runs-on: ubuntu-latest
    steps:
      - name: Label PR
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
