version: '3.8'

# Test compose: adapter + mock backend
# Usage: docker compose -f docker-compose.test.yaml up

services:
  mock-backend:
    image: python:3.11-slim
    command: >
      python -c "
      from http.server import HTTPServer, BaseHTTPRequestHandler
      import json

      class Handler(BaseHTTPRequestHandler):
          def do_GET(self):
              if self.path == '/health':
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({'status': 'healthy'}).encode())
              else:
                  self.send_response(404)
                  self.end_headers()

          def do_POST(self):
              content_length = int(self.headers.get('Content-Length', 0))
              body = self.rfile.read(content_length)
              request = json.loads(body) if body else {}

              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.end_headers()

              response = {
                  'choices': [{
                      'message': {
                          'role': 'assistant',
                          'content': 'Hello from mock backend!'
                      }
                  }],
                  'model': 'mock-model',
                  'usage': {'prompt_tokens': 10, 'completion_tokens': 5}
              }
              self.wfile.write(json.dumps(response).encode())

          def log_message(self, format, *args):
              print(f'[mock-backend] {format % args}')

      print('Mock backend starting on :8080')
      HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
      "
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 3

  adapter:
    build: .
    depends_on:
      mock-backend:
        condition: service_healthy
    environment:
      ORCH_URL: http://host.docker.internal:7935
      ORCH_SECRET: test-secret-for-dev
      CAPABILITY_NAME: test-model
      BACKEND_URL: http://mock-backend:8080
      BACKEND_INFERENCE_PATH: /v1/chat/completions
      ADAPTER_PORT: "9090"
      CAPACITY: "2"
      HEALTH_CHECK_INTERVAL: "5"
      REGISTER_INTERVAL: "15"
    ports:
      - "9090:9090"
