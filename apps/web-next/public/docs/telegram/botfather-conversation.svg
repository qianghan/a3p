<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Telegram conversation with BotFather: sending /newbot, naming the bot, and receiving the API token">
  <rect width="640" height="400" fill="#f4ecd9"/>

  <!-- chat header -->
  <rect x="24" y="20" width="592" height="48" rx="12" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>
  <circle cx="56" cy="44" r="15" fill="#149578" opacity="0.15"/>
  <text x="56" y="49" text-anchor="middle" font-size="15">🤖</text>
  <text x="82" y="40" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="600" fill="#3d3627">BotFather</text>
  <text x="82" y="56" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="11" fill="#7a7163">bot</text>

  <!-- outgoing: /newbot -->
  <rect x="380" y="84" width="236" height="34" rx="14" fill="#149578"/>
  <text x="596" y="106" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#ffffff">/newbot</text>

  <!-- incoming: name prompt -->
  <rect x="24" y="130" width="392" height="36" rx="14" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>
  <text x="40" y="153" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#3d3627">Alright, let's create a new bot. What should I call it?</text>

  <!-- outgoing: name -->
  <rect x="380" y="178" width="236" height="34" rx="14" fill="#149578"/>
  <text x="596" y="200" text-anchor="end" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#ffffff">AgentBook Helper</text>

  <!-- incoming: username prompt -->
  <rect x="24" y="224" width="440" height="36" rx="14" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>
  <text x="40" y="247" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#3d3627">Good. Now pick a username ending in "bot" — e.g. agentbook_helper_bot</text>

  <!-- outgoing: username -->
  <rect x="380" y="272" width="236" height="34" rx="14" fill="#149578"/>
  <text x="596" y="294" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#ffffff">agentbook_helper_bot</text>

  <!-- incoming: done + token, highlighted -->
  <rect x="24" y="318" width="530" height="64" rx="14" fill="#ffffff" stroke="#149578" stroke-width="2"/>
  <text x="40" y="338" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#3d3627">Done! Use this token to access the HTTP API:</text>
  <rect x="40" y="346" width="392" height="24" rx="6" fill="#f4ecd9"/>
  <text x="50" y="363" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#0c6e57">123456789:AAHgz2ExampleTokenNotReal_9x</text>

  <!-- callout -->
  <path d="M470 300l24 18" stroke="#0c6e57" stroke-width="2" stroke-linecap="round"/>
  <text x="500" y="296" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="600" fill="#0c6e57">Copy this token</text>
</svg>
