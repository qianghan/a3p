<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Settings, Chatbots tab, Telegram card not yet connected, showing the three setup steps and a field to paste a bot token">
  <rect width="640" height="400" fill="#f4ecd9"/>

  <!-- tab strip -->
  <rect x="24" y="20" width="592" height="40" rx="10" fill="#efe4cb"/>
  <text x="44" y="45" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#7a7163">Profile</text>
  <text x="116" y="45" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#7a7163">Notifications</text>
  <rect x="228" y="24" width="90" height="32" rx="8" fill="#149578"/>
  <text x="273" y="45" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Chatbots</text>
  <text x="340" y="45" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#7a7163">Billing</text>

  <!-- card -->
  <rect x="24" y="76" width="592" height="308" rx="16" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>

  <!-- card header -->
  <line x1="24" y1="140" x2="616" y2="140" stroke="#ece2c8" stroke-width="1.5"/>
  <rect x="44" y="96" width="36" height="36" rx="10" fill="#149578" opacity="0.12"/>
  <text x="62" y="120" text-anchor="middle" font-size="18">✈️</text>
  <text x="94" y="112" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="15" font-weight="600" fill="#3d3627">Telegram</text>
  <text x="94" y="130" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12" fill="#7a7163">Record expenses and manage finances via chat</text>
  <rect x="518" y="100" width="98" height="24" rx="12" fill="#ece2c8"/>
  <text x="567" y="116" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="11" fill="#7a7163">Not connected</text>

  <!-- steps -->
  <g font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="14" fill="#5b5344">
    <circle cx="60" cy="168" r="10" fill="#ece2c8"/>
    <text x="60" y="172" text-anchor="middle" font-size="11" fill="#7a7163">1</text>
    <text x="82" y="173">Open <tspan fill="#149578" font-weight="600">@BotFather</tspan> in Telegram</text>

    <circle cx="60" cy="204" r="10" fill="#ece2c8"/>
    <text x="60" y="208" text-anchor="middle" font-size="11" fill="#7a7163">2</text>
    <text x="82" y="209">Send</text>
    <rect x="118" y="196" width="66" height="20" rx="5" fill="#f4ecd9"/>
    <text x="151" y="210" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#5b5344">/newbot</text>
    <text x="192" y="209">and follow the prompts</text>

    <circle cx="60" cy="240" r="10" fill="#ece2c8"/>
    <text x="60" y="244" text-anchor="middle" font-size="11" fill="#7a7163">3</text>
    <text x="82" y="245">Copy the API token and paste it below</text>
  </g>

  <!-- token input + button -->
  <rect x="44" y="272" width="392" height="42" rx="10" fill="#f4ecd9" stroke="#d6cdb6" stroke-width="1.5"/>
  <path d="M64 289a5 5 0 1 1 -0.1 0" fill="none" stroke="#7a7163" stroke-width="2"/>
  <circle cx="64" cy="293" r="3.4" fill="none" stroke="#7a7163" stroke-width="2"/>
  <path d="M67 293h8" stroke="#7a7163" stroke-width="2"/>
  <text x="88" y="298" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#a99f8c">Paste bot token here</text>

  <rect x="448" y="272" width="144" height="42" rx="10" fill="#149578"/>
  <path d="M470 286l16 7-16 7v-5l10-2-10-2z" fill="#ffffff"/>
  <text x="506" y="298" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Connect Bot</text>

  <!-- callout -->
  <path d="M330 348v14" stroke="#0c6e57" stroke-width="2" stroke-linecap="round"/>
  <text x="330" y="340" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="600" fill="#0c6e57">Settings → Chatbots → Telegram</text>
</svg>
