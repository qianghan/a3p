<svg viewBox="0 0 640 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Telegram card after connecting, showing the bot username, active webhook, linked chats, and a disconnect option">
  <rect width="640" height="340" fill="#f4ecd9"/>

  <!-- card -->
  <rect x="24" y="20" width="592" height="300" rx="16" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>

  <!-- header -->
  <line x1="24" y1="84" x2="616" y2="84" stroke="#ece2c8" stroke-width="1.5"/>
  <rect x="44" y="40" width="36" height="36" rx="10" fill="#149578" opacity="0.12"/>
  <text x="62" y="64" text-anchor="middle" font-size="18">✈️</text>
  <text x="94" y="56" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="15" font-weight="600" fill="#3d3627">Telegram</text>
  <text x="94" y="74" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#7a7163">@agentbook_helper_bot</text>
  <rect x="510" y="44" width="106" height="24" rx="12" fill="#149578" opacity="0.14"/>
  <text x="563" y="60" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="600" fill="#0c6e57">● Connected</text>

  <!-- status grid -->
  <rect x="44" y="102" width="272" height="52" rx="10" fill="#f4ecd9"/>
  <text x="60" y="120" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="11" fill="#7a7163">Webhook</text>
  <path d="M60 138l4 4 8-8" fill="none" stroke="#149578" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="80" y="142" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#0c6e57">Active</text>

  <rect x="324" y="102" width="272" height="52" rx="10" fill="#f4ecd9"/>
  <text x="340" y="120" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="11" fill="#7a7163">Linked chats</text>
  <text x="340" y="142" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#3d3627">1</text>

  <!-- quick start -->
  <rect x="44" y="170" width="552" height="56" rx="10" fill="#f4ecd9"/>
  <text x="60" y="190" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="600" fill="#7a7163">QUICK START</text>
  <text x="60" y="210" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#5b5344">Open <tspan fill="#149578" font-weight="600">@agentbook_helper_bot</tspan> → send <tspan font-family="ui-monospace,SFMono-Regular,Menlo,monospace">/start</tspan> → type expenses naturally</text>

  <!-- footer -->
  <text x="44" y="256" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12" fill="#149578">Open in Telegram ↗</text>
  <path d="M180 251a8 8 0 1 1 0-1" fill="none" stroke="#7a7163" stroke-width="1.6"/>

  <path d="M560 245l4 6h-8z" fill="#c0454a"/>
  <text x="524" y="256" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12" font-weight="600" fill="#c0454a">Disconnect</text>
</svg>
