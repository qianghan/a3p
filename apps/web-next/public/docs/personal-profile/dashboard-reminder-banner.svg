<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dashboard banner nudging the user to complete their personal profile for better tax and financial advice">
  <rect width="640" height="200" fill="#f4ecd9"/>

  <!-- faux dashboard header -->
  <rect x="24" y="20" width="592" height="28" rx="6" fill="#ece2c8"/>
  <circle cx="40" cy="34" r="6" fill="#7a7163" opacity="0.35"/>
  <rect x="56" y="29" width="120" height="10" rx="3" fill="#7a7163" opacity="0.25"/>

  <!-- the banner itself -->
  <rect x="24" y="64" width="592" height="52" rx="10" fill="#ffffff" stroke="#149578" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="24" y="64" width="592" height="52" rx="10" fill="#149578" opacity="0.06"/>
  <circle cx="52" cy="90" r="12" fill="#149578" opacity="0.14"/>
  <text x="52" y="95" text-anchor="middle" font-size="14">🙂</text>
  <text x="80" y="86" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#3d3627">Tell your agent a bit about yourself — name, income,</text>
  <text x="80" y="102" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#3d3627">family — for much better tax and financial advice.</text>
  <text x="500" y="94" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#149578">Complete profile</text>
  <path d="M598 84l6 6-6 6" stroke="#7a7163" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- faux content below -->
  <rect x="24" y="132" width="280" height="14" rx="4" fill="#ece2c8"/>
  <rect x="24" y="154" width="592" height="34" rx="8" fill="#ece2c8" opacity="0.6"/>
</svg>
