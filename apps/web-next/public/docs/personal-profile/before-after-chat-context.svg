<svg viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Before and after comparison: a generic answer without a profile versus a personalized, contextual answer once the profile is complete">
  <rect width="640" height="320" fill="#f4ecd9"/>

  <!-- column headers -->
  <text x="160" y="34" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#7a7163">Without a profile</text>
  <text x="480" y="34" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#0c6e57">With a completed profile</text>

  <!-- shared question -->
  <rect x="24" y="52" width="592" height="34" rx="14" fill="#ece2c8"/>
  <text x="320" y="74" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#3d3627">"What should I set aside for taxes this quarter?"</text>

  <!-- left (generic) answer -->
  <rect x="24" y="104" width="292" height="96" rx="14" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>
  <text x="40" y="128" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#5b5344">A common rule of thumb is</text>
  <text x="40" y="146" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#5b5344">25–30% of net income. Want</text>
  <text x="40" y="164" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#5b5344">me to pull your income for</text>
  <text x="40" y="182" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#5b5344">a specific number?</text>

  <!-- right (personalized) answer -->
  <rect x="324" y="104" width="292" height="96" rx="14" fill="#ffffff" stroke="#149578" stroke-width="2"/>
  <text x="340" y="124" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#3d3627">You're self-employed in Ontario,</text>
  <text x="340" y="142" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#3d3627">married filing jointly with 2</text>
  <text x="340" y="160" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#3d3627">dependents — at ~$120k income,</text>
  <text x="340" y="178" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#3d3627">set aside about $7,400 this quarter.</text>

  <!-- callout -->
  <path d="M480 208v14" stroke="#0c6e57" stroke-width="2" stroke-linecap="round"/>
  <text x="480" y="240" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#0c6e57">Specific to your actual situation —</text>
  <text x="480" y="258" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#0c6e57">no back-and-forth needed</text>

  <!-- lock icon on left to suggest missing context -->
  <g transform="translate(160,220)">
    <rect x="-10" y="0" width="20" height="16" rx="3" fill="none" stroke="#a99f8c" stroke-width="2"/>
    <path d="M-6 0v-5a6 6 0 0 1 12 0v5" fill="none" stroke="#a99f8c" stroke-width="2"/>
  </g>
  <text x="160" y="258" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12" fill="#a99f8c">Missing your context</text>
</svg>
