<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Add to Home Screen confirmation dialog with the Add button highlighted">
  <rect width="640" height="280" fill="#f4ecd9"/>

  <!-- dialog -->
  <rect x="120" y="20" width="400" height="240" rx="18" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>

  <!-- header row: Cancel / title / Add -->
  <text x="150" y="58" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="16" fill="#7a7163">Cancel</text>
  <text x="320" y="58" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="16" font-weight="600" fill="#1a1714">Add to Home Screen</text>

  <rect x="440" y="38" width="66" height="30" rx="8" fill="#149578" opacity="0.14"/>
  <rect x="440" y="38" width="66" height="30" rx="8" fill="none" stroke="#149578" stroke-width="2.5" stroke-dasharray="3 4"/>
  <text x="473" y="58" text-anchor="middle" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="16" font-weight="700" fill="#0c6e57">Add</text>

  <line x1="120" y1="82" x2="520" y2="82" stroke="#eee6d3" stroke-width="1.5"/>

  <!-- app icon + editable name -->
  <g transform="translate(150,110)">
    <rect width="72" height="72" rx="17" fill="#10151a"/>
    <text x="36" y="53" text-anchor="middle" font-family="SF Pro Display,Helvetica Neue,Arial,sans-serif" font-size="52" font-weight="720" letter-spacing="-2" fill="#149578">a</text>
  </g>

  <rect x="246" y="122" width="240" height="40" rx="9" fill="#f7f3e9" stroke="#d6cdb6" stroke-width="1.5"/>
  <text x="260" y="147" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="16" fill="#1a1714">AgentBook</text>

  <text x="150" y="206" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#7a7163">agentbook.brainliber.com</text>
</svg>
