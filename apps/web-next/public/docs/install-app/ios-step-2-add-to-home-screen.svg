<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="iOS share sheet with Add to Home Screen highlighted in the list of actions">
  <rect width="640" height="420" fill="#f4ecd9"/>

  <!-- sheet -->
  <rect x="24" y="16" width="592" height="388" rx="20" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>
  <rect x="288" y="32" width="64" height="5" rx="2.5" fill="#d6cdb6"/>

  <!-- share target row (top icons) -->
  <g font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="11" fill="#7a7163" text-anchor="middle">
    <circle cx="90" cy="86" r="26" fill="#eef0f2"/>
    <circle cx="170" cy="86" r="26" fill="#eef0f2"/>
    <circle cx="250" cy="86" r="26" fill="#eef0f2"/>
    <circle cx="330" cy="86" r="26" fill="#eef0f2"/>
    <circle cx="410" cy="86" r="26" fill="#eef0f2"/>
    <text x="90" y="128">Messages</text>
    <text x="170" y="128">Mail</text>
    <text x="250" y="128">Notes</text>
    <text x="330" y="128">AirDrop</text>
    <text x="410" y="128">More</text>
  </g>

  <line x1="48" y1="156" x2="568" y2="156" stroke="#eee6d3" stroke-width="1.5"/>

  <!-- action list -->
  <g font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="17" fill="#1a1714">
    <g opacity="0.55">
      <rect x="48" y="34" width="0" height="0"/>
      <path d="M56 182l6 6 12-14" transform="translate(0,0)" stroke="#7a7163" stroke-width="0" fill="none"/>
    </g>

    <!-- Copy -->
    <rect x="48" y="172" width="28" height="28" rx="6" stroke="#c9c0af" stroke-width="2" fill="none"/>
    <text x="92" y="192">Copy</text>
    <line x1="48" y1="216" x2="568" y2="216" stroke="#eee6d3" stroke-width="1.5"/>

    <!-- Add Bookmark -->
    <path d="M62 226v26l10-8 10 8v-26z" stroke="#c9c0af" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <text x="92" y="246">Add Bookmark</text>
    <line x1="48" y1="270" x2="568" y2="270" stroke="#eee6d3" stroke-width="1.5"/>

    <!-- Add to Home Screen — highlighted -->
    <rect x="40" y="278" width="560" height="52" rx="10" fill="#149578" opacity="0.12"/>
    <rect x="40" y="278" width="560" height="52" rx="10" fill="none" stroke="#149578" stroke-width="2.5" stroke-dasharray="3 4"/>
    <rect x="62" y="290" width="28" height="28" rx="7" stroke="#0c6e57" stroke-width="2.2" fill="none"/>
    <path d="M76 296v16M68 304h16" stroke="#0c6e57" stroke-width="2.2" stroke-linecap="round"/>
    <text x="98" y="311" font-weight="600" fill="#0c6e57">Add to Home Screen</text>
    <line x1="48" y1="346" x2="568" y2="346" stroke="#eee6d3" stroke-width="1.5"/>

    <!-- Print -->
    <rect x="60" y="356" width="32" height="22" rx="3" stroke="#c9c0af" stroke-width="2" fill="none"/>
    <text x="98" y="374">Print</text>
  </g>
</svg>
