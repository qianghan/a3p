<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="WhatsApp conversation: sending the link code to the AgentBook number and receiving a connected confirmation">
  <rect width="640" height="300" fill="#f4ecd9"/>

  <!-- chat header -->
  <rect x="24" y="20" width="592" height="48" rx="12" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>
  <circle cx="56" cy="44" r="15" fill="#25a35a" opacity="0.15"/>
  <text x="56" y="49" text-anchor="middle" font-size="15">💬</text>
  <text x="82" y="40" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="600" fill="#3d3627">AgentBook</text>
  <text x="82" y="56" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#7a7163">+1 (555) 010-0199</text>

  <!-- outgoing: link code -->
  <rect x="380" y="86" width="236" height="34" rx="14" fill="#25a35a"/>
  <text x="596" y="108" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="600" fill="#ffffff">LINK-A1B2C3</text>

  <!-- incoming: confirmation -->
  <rect x="24" y="132" width="470" height="58" rx="14" fill="#ffffff" stroke="#25a35a" stroke-width="2"/>
  <text x="40" y="154" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" fill="#0c6e57">You're connected!</text>
  <text x="40" y="174" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="12.5" fill="#3d3627">Try "log $12 parking" or ask a question about your books.</text>

  <!-- outgoing: real use -->
  <rect x="380" y="204" width="236" height="34" rx="14" fill="#25a35a"/>
  <text x="596" y="226" text-anchor="end" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#ffffff">log $12 parking</text>

  <!-- incoming: agent reply -->
  <rect x="24" y="250" width="330" height="34" rx="14" fill="#ffffff" stroke="#d6cdb6" stroke-width="1.5"/>
  <text x="40" y="272" font-family="-apple-system,Helvetica Neue,Arial,sans-serif" font-size="13" fill="#3d3627">Logged $12.00 to Travel — Parking ✅</text>
</svg>
